<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="coinGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffc400"/>
      <stop offset="100%" stop-color="#e6a800"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0.3" y2="0.3">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Coin body -->
  <circle cx="24" cy="24" r="22" fill="url(#coinGrad)" stroke="#b8860b" stroke-width="1.5"/>
  <!-- Inner ring -->
  <circle cx="24" cy="24" r="18" fill="none" stroke="#b8860b" stroke-width="0.8" opacity="0.5"/>
  <!-- Spanish flag stripes -->
  <rect x="10" y="10" width="28" height="5" rx="1" fill="#c60b1e" opacity="0.85"/>
  <rect x="10" y="33" width="28" height="5" rx="1" fill="#c60b1e" opacity="0.85"/>
  <!-- S letter -->
  <text x="24" y="29" text-anchor="middle" font-family="Georgia, serif" font-weight="700" font-size="18" fill="#c60b1e" opacity="0.9">S</text>
  <!-- Shine -->
  <circle cx="24" cy="24" r="22" fill="url(#shine)"/>
</svg>
